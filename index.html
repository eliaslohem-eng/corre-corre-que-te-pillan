<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Corre Corre Que Te Pillan</title>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#06172c"><link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Corre Corre"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#040b16;font-family:Arial,Helvetica,sans-serif;touch-action:none;user-select:none}#game{position:relative;width:100%;height:100%;background:#06172c}canvas{width:100%;height:100%;display:block}.screen{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;color:white;padding:18px;background:radial-gradient(circle at top,rgba(62,190,255,.28),transparent 42%),linear-gradient(#06172ce8,#020914f4)}.center{justify-content:center}.hidden{display:none!important}h1{font-size:48px;line-height:.85;margin:0;color:#ffd43b;text-shadow:3px 4px #000}.sub{font-size:20px;font-weight:900;margin:10px 0 18px}.btn{border:0;border-radius:25px;padding:13px 23px;margin:7px;font-weight:900;font-size:16px;text-transform:uppercase;color:#17202a;background:#ffd43b;box-shadow:0 5px 0 #a86f00}.blue{background:#4dabf7;color:white;box-shadow:0 5px 0 #1864ab}.green{background:#2ecc71;color:white;box-shadow:0 5px 0 #087b36}.red{background:#ff4757;color:white;box-shadow:0 5px 0 #a51625}#hud{position:absolute;top:8px;left:8px;right:8px;z-index:8;display:none;justify-content:space-between;color:white;font-weight:900;text-shadow:2px 2px #000}.pill{background:#0008;border:1px solid #fff4;border-radius:999px;padding:6px 8px}.small{font-size:12px;color:#d7e8ff;line-height:1.45;margin-top:12px}.panel{width:100%;overflow-y:auto;flex:1;padding-bottom:90px}.card{display:flex;gap:10px;align-items:center;text-align:left;margin:9px 0;padding:10px;border-radius:15px;background:#ffffff22;border:2px solid #ffffff26}.icon{width:60px;height:60px;min-width:60px;border-radius:14px;background:#0006;display:flex;align-items:center;justify-content:center;font-size:32px}.info{flex:1}.info b{color:#ffd43b}.info small{display:block;color:#d7e8ff;font-size:12px}.top{width:100%;display:flex;align-items:center;justify-content:space-between}.back{font-size:13px;padding:10px 13px}.installBox{position:absolute;left:12px;right:12px;bottom:12px;z-index:20;background:#000d;color:white;border-radius:14px;padding:10px;display:none}.installBox button{margin:4px}
</style></head>
<body><div id="game"><canvas id="c"></canvas><div id="hud"><span class="pill">⭐ <span id="score">0</span></span><span class="pill">🪙 <span id="coins">0</span></span><span class="pill">🏁 <span id="dist">0</span>m</span></div>
<div id="menu" class="screen center"><h1>CORRE<br>CORRE</h1><div class="sub">QUE TE PILLAN</div><p>Monedas: 🪙 <span id="total">0</span></p><button class="btn" onclick="startGame()">Jugar</button><button class="btn blue" onclick="openShop()">Tienda</button><button class="btn green" onclick="toggleMusic()" id="musicBtn">Música ON</button><div class="small">Versión lista para APK automático.<br>Juego offline dentro del APK.</div></div>
<div id="shop" class="screen hidden"><div class="top"><button class="btn blue back" onclick="closeShop()">← Volver</button><h2>Tienda</h2><span style="width:75px"></span></div><p>Tu dinero: 🪙 <span id="shopCoins">0</span></p><div id="shopList" class="panel"></div><button class="btn red" onclick="closeShop()">Volver al menú</button></div>
<div id="over" class="screen center hidden"><h2>¡Te pillaron!</h2><p>Puntos: <span id="fs">0</span><br>Distancia: <span id="fd">0</span>m<br>Monedas: 🪙 <span id="fc">0</span></p><button class="btn" onclick="startGame()">Reintentar</button><button class="btn blue" onclick="backMenu()">Menú</button></div></div>
<script>
if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.log));}
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');function resize(){canvas.width=innerWidth;canvas.height=innerHeight}addEventListener('resize',resize);resize();const $=id=>document.getElementById(id);
let state='MENU',lane=0,vis=0,frames=0,score=0,coins=0,dist=0,speed=8,base=8,objs=[],jump=0,roll=0,mag=0,dbl=0,shield=false,total=parseInt(localStorage.ccapk_coins||'0'),up=JSON.parse(localStorage.ccapk_up||'[]');$('total').textContent=total;function save(){localStorage.ccapk_coins=total;localStorage.ccapk_up=JSON.stringify(up)}function has(id){return up.includes(id)}
function project(l,z){let h=canvas.height,w=canvas.width,scale=Math.max(.08,1-z/900),x=w/2+l*w*.32*scale,y=h*.86-z*.72;return{x,y,scale}}function drawBg(){let w=canvas.width,h=canvas.height,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#74d6ff');g.addColorStop(.55,'#0b8bc7');g.addColorStop(1,'#04243d');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle='#0877aa';ctx.beginPath();ctx.moveTo(w*.1,h);ctx.lineTo(w*.42,h*.15);ctx.lineTo(w*.58,h*.15);ctx.lineTo(w*.9,h);ctx.fill();ctx.strokeStyle='#ffffff99';ctx.lineWidth=3;for(let l of[-.5,.5]){ctx.beginPath();ctx.moveTo(w/2+l*w*.33,h);ctx.lineTo(w/2+l*w*.07,h*.15);ctx.stroke()}for(let i=0;i<18;i++){let z=(i*70+(frames*speed*2)%70);let p=project(-1.9,z),p2=project(1.9,z);ctx.fillStyle='#063852';ctx.fillRect(p.x-8*p.scale,p.y,16*p.scale,40*p.scale);ctx.fillRect(p2.x-8*p2.scale,p2.y,16*p2.scale,40*p2.scale)}}
function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}
function drawCowboy(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(0,52,35,10,0,0,7);ctx.fill();ctx.fillStyle='#263d56';ctx.fillRect(-18,5,14,45);ctx.fillRect(4,5,14,45);ctx.fillStyle='#5b3219';ctx.fillRect(-24,45,25,12);ctx.fillRect(0,45,25,12);ctx.fillStyle='#102b58';round(-26,-45,52,58,12);ctx.fill();ctx.fillStyle='#80501f';ctx.fillRect(-28,8,56,8);ctx.fillStyle='#c9824a';ctx.beginPath();ctx.arc(0,-62,22,0,7);ctx.fill();ctx.fillStyle='#171717';ctx.beginPath();ctx.arc(0,-54,17,0,Math.PI);ctx.fill();ctx.fillStyle='#72431f';ctx.beginPath();ctx.ellipse(0,-82,48,10,0,0,7);ctx.fill();round(-20,-112,40,32,12);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-8,-65,2.5,0,7);ctx.arc(8,-65,2.5,0,7);ctx.fill();ctx.restore()}
function drawChaser(){let s=1.25;ctx.save();ctx.translate(canvas.width/2,canvas.height*.84+Math.sin(frames*.07)*4);ctx.scale(s,s);ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(0,55,55,16,0,0,7);ctx.fill();ctx.fillStyle='#1b1b20';round(-32,-35,64,80,18);ctx.fill();ctx.fillStyle='#c9824a';ctx.beginPath();ctx.arc(0,-55,25,0,7);ctx.fill();ctx.fillStyle='#f0bd4b';ctx.beginPath();ctx.ellipse(0,-72,24,10,0,0,7);ctx.fill();ctx.restore()}
function drawObj(o){let p=project(o.l,o.z),s=p.scale;if(o.t==='coin'){ctx.fillStyle='#ffc107';ctx.beginPath();ctx.arc(p.x,p.y,22*s,0,7);ctx.fill();ctx.fillStyle='#7a4b00';ctx.font=`${24*s}px Arial`;ctx.textAlign='center';ctx.fillText('$',p.x,p.y+8*s);return}if(o.t==='rock'){ctx.fillStyle='#79818e';ctx.beginPath();ctx.moveTo(p.x-28*s,p.y+25*s);ctx.lineTo(p.x-6*s,p.y-28*s);ctx.lineTo(p.x+30*s,p.y+25*s);ctx.fill()}if(o.t==='barrel'){ctx.fillStyle='#8a4f24';round(p.x-25*s,p.y-35*s,50*s,70*s,14*s);ctx.fill();ctx.strokeStyle='#222';ctx.lineWidth=5*s;ctx.strokeRect(p.x-25*s,p.y-15*s,50*s,30*s)}if(o.t==='log'){ctx.fillStyle='#6b3f1d';round(p.x-45*s,p.y-14*s,90*s,28*s,14*s);ctx.fill()}if(o.t==='magnet'||o.t==='shield'||o.t==='double'){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,28*s,0,7);ctx.fill();ctx.font=`${28*s}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.t==='magnet'?'🧲':o.t==='shield'?'🛡️':'2x',p.x,p.y)}}
function spawn(){let rate=Math.max(18,55-Math.floor(dist/70));if(frames%rate===0){let l=[-1,0,1][Math.floor(Math.random()*3)];if(Math.random()<.62){let a=['rock','barrel'];if(dist>250)a.push('log');objs.push({t:a[Math.floor(Math.random()*a.length)],l,z:900})}else for(let i=0;i<5;i++)objs.push({t:'coin',l,z:900+i*55})}if(frames%420===0&&frames>120)objs.push({t:['magnet','shield','double'][Math.floor(Math.random()*3)],l:[-1,0,1][Math.floor(Math.random()*3)],z:900,power:true})}
function updateObjs(){for(let i=objs.length-1;i>=0;i--){let o=objs[i];o.z-=speed;if(o.t==='coin'&&mag>0){o.l+=(vis-o.l)*.08;o.z+=(80-o.z)*.04}drawObj(o);let hitZ=Math.abs(o.z-80)<55,hitL=Math.abs(o.l-vis)<.46;if(hitZ&&hitL){if(o.t==='coin'){coins++;score+=dbl>0?100:50;$('coins').textContent=coins;objs.splice(i,1);continue}if(o.power){if(o.t==='magnet')mag=has('magnet')?720:470;if(o.t==='shield')shield=true;if(o.t==='double')dbl=has('double')?720:470;objs.splice(i,1);continue}let safe=(o.t==='log'&&roll>0)||(o.t!=='log'&&jump>0);if(!safe){if(shield){shield=false;objs.splice(i,1)}else return gameOver()}}if(o.z<0)objs.splice(i,1)}}
function loop(){if(state!=='PLAYING')return;ctx.clearRect(0,0,canvas.width,canvas.height);drawBg();spawn();updateObjs();drawChaser();vis+=(lane-vis)*.22;let y=canvas.height*.75;if(jump>0){let p=jump/40;y-=Math.sin(p*Math.PI)*canvas.height*.13;jump--}if(roll>0)roll--;drawCowboy(canvas.width/2+vis*canvas.width*.25,y,roll>0?.65:.9);if(shield){ctx.strokeStyle='#74c0fc';ctx.lineWidth=4;ctx.beginPath();ctx.arc(canvas.width/2+vis*canvas.width*.25,y-24,60,0,7);ctx.stroke()}frames++;dist+=speed*.038;speed=Math.min(18,base+dist/115);score+=dbl>0?2:1;if(mag>0)mag--;if(dbl>0)dbl--;if(frames%5===0){$('score').textContent=Math.floor(score);$('dist').textContent=Math.floor(dist)}requestAnimationFrame(loop)}
window.startGame=()=>{playMusic();state='PLAYING';menu.classList.add('hidden');shop.classList.add('hidden');over.classList.add('hidden');hud.style.display='flex';objs=[];lane=vis=frames=score=coins=dist=0;speed=base;jump=roll=mag=dbl=0;shield=has('shield');$('score').textContent=0;$('coins').textContent=0;$('dist').textContent=0;loop()};function gameOver(){state='OVER';hud.style.display='none';total+=coins;save();$('fs').textContent=Math.floor(score);$('fd').textContent=Math.floor(dist);$('fc').textContent=coins;over.classList.remove('hidden')}window.backMenu=()=>{state='MENU';over.classList.add('hidden');menu.classList.remove('hidden');$('total').textContent=total;drawMenu()};function drawMenu(){ctx.clearRect(0,0,canvas.width,canvas.height);drawBg();drawChaser();drawCowboy(canvas.width/2,canvas.height*.76,.95)}
window.openShop=()=>{menu.classList.add('hidden');shop.classList.remove('hidden');renderShop()};window.closeShop=()=>{shop.classList.add('hidden');menu.classList.remove('hidden');$('total').textContent=total};function renderShop(){shopCoins.textContent=total;shopList.innerHTML='';[['magnet','Imán Largo',600,'🧲'],['shield','Escudo Inicial',700,'🛡️'],['double','Doble Puntos',900,'2x']].forEach(u=>{let own=has(u[0]);shopList.innerHTML+=`<div class="card"><div class="icon">${u[3]}</div><div class="info"><b>${u[1]}</b><small>Mejora guardada en el equipo.</small></div><button class="btn ${own?'green':''}" data-u="${u[0]}">${own?'Comprado':'🪙 '+u[2]}</button></div>`});shopList.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{let id=b.dataset.u,price=id==='magnet'?600:id==='shield'?700:900;if(has(id))return;if(total>=price){total-=price;up.push(id);save();renderShop();$('total').textContent=total}else alert('No tienes monedas suficientes')})}
let music=true,audio=null,timer=null;window.toggleMusic=()=>{music=!music;musicBtn.textContent=music?'Música ON':'Música OFF';if(!music){clearInterval(timer);timer=null}else playMusic()};function playMusic(){if(!music)return;if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==='suspended')audio.resume();if(timer)return;let notes=[196,247,294,330,294,247,220,196],i=0;timer=setInterval(()=>{if(state==='PLAYING'||state==='MENU'){let o=audio.createOscillator(),g=audio.createGain();o.type='triangle';o.frequency.value=notes[i++%notes.length];g.gain.setValueAtTime(.0001,audio.currentTime);g.gain.exponentialRampToValueAtTime(.045,audio.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+.25);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+.28)}},240)}let sx=0,sy=0;addEventListener('touchstart',e=>{sx=e.changedTouches[0].screenX;sy=e.changedTouches[0].screenY},{passive:false});addEventListener('touchmove',e=>e.preventDefault(),{passive:false});addEventListener('touchend',e=>{if(state!=='PLAYING')return;let dx=e.changedTouches[0].screenX-sx,dy=e.changedTouches[0].screenY-sy;if(Math.abs(dx)>Math.abs(dy)){if(dx>25&&lane<1)lane++;if(dx<-25&&lane>-1)lane--}else{if(dy<-25&&jump<=0&&roll<=0)jump=40;if(dy>25&&roll<=0&&jump<=0)roll=32}},{passive:false});drawMenu();
</script></body></html>
